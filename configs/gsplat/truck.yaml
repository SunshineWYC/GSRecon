scene:
  data_path: "data/truck/"
  output_path: "results/gsplat/truck/"
  exp_name: "exp_002"
  type: "colmap"

training_params:
  preload: True  # False:disk / True:cpu/cuda
  preload_device: "cuda:0"  # "cuda:0" / "cpu"
  preload_dtype: "fp32"
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001
  lambda_dssim: 0.2
  optimizer_type: "default" # "default" / sparse_adam" / "selective_adam"
  opacity_reset_interval: 3000
  densification_interval: 100
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0004
  percent_dense: 0.01

  log: False
  log_interval: 100
  image_log_interval: 500
  eval: False
  eval_split_interval: 8
  eval_interval: 3000
  pose_optimize: True
  pose_updater_params:
    init: "zero"
  pose_optimizer_params:
    lr: 1e-5
    reg: 1e-6
    start_iter: 0
    end_iter: 30000

renderer_params:
  renderer_type: "gsplat"

model_params:
  image_scale: 1.0
  scene_scale: 1.0
  spherical_harmonics: True
  sh_degree: 3
  max_num_gaussians: 10000000
